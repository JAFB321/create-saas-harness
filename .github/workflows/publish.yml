name: publish

# Publishes packages/cli to npm when a version tag is pushed (or manually).
# Flow: bump packages/cli/package.json version → tag vX.Y.Z → push tag.
# Needs the NPM_TOKEN repo secret (an npm automation token); setup-node's
# registry-url writes it into ~/.npmrc via NODE_AUTH_TOKEN so npm publish
# picks it up regardless of working-directory (packages/cli).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Guard — NPM_TOKEN secret present
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "Missing NPM_TOKEN repo secret (npm automation token)." >&2
            exit 1
          fi

      - name: Guard — tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match packages/cli/package.json version $VERSION." >&2
            exit 1
          fi

      - name: Guard — skip if this version is already on npm
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION is already published — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # prepack runs lib/sync-template.mjs, bundling ../../template into the tarball.
      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public
