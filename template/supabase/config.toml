project_id = "{{PROJECT_SLUG}}"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Storage is handled by an external S3-compatible provider (see STORAGE_PROVIDER), not Supabase
# Storage. Disabled on purpose so the local stack is lighter.
[storage]
enabled = false
